apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pipeline-cost-observatory.fullname" . }}
  labels:
    app: {{ include "pipeline-cost-observatory.fullname" . }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "pipeline-cost-observatory.fullname" . }}
  template:
    metadata:
      labels:
        app: {{ include "pipeline-cost-observatory.fullname" . }}
    spec:
      containers:
        - name: dashboard
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8501
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.databaseUrlSecretName }}
                  key: {{ .Values.databaseUrlSecretKey }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /
              port: 8501
            initialDelaySeconds: 10
            periodSeconds: 10
